<!DOCTYPE html>
<html>
<head>
    <title>DTMF Signal Analyzer</title>
    <style>
        body { 
            text-align: center; 
            font-family: Arial; 
        }
        button {
            width: 60px;
            height: 60px;
            font-size: 20px;
            margin: 5px;
        }
        canvas {
            border: 1px solid black;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h2>DTMF Signal Analyzer</h2>
<p>Sampling Frequency: 8000 Hz</p>

<div id="keypad"></div>
<canvas id="graph" width="800" height="300"></canvas>

<script>
const fs = 8000;         // Sampling frequency
const T = 0.02;          // 20 ms window (scientific display)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const dtmf = {
    "1":[697,1209], "2":[697,1336], "3":[697,1477], "A":[697,1633],
    "4":[770,1209], "5":[770,1336], "6":[770,1477], "B":[770,1633],
    "7":[852,1209], "8":[852,1336], "9":[852,1477], "C":[852,1633],
    "*":[941,1209], "0":[941,1336], "#":[941,1477], "D":[941,1633]
};

const keys = [
["1","2","3","A"],
["4","5","6","B"],
["7","8","9","C"],
["*","0","#","D"]
];

const keypad = document.getElementById("keypad");

keys.forEach(row => {
    row.forEach(key => {
        const btn = document.createElement("button");
        btn.innerText = key;
        btn.onclick = () => playTone(key);
        keypad.appendChild(btn);
    });
    keypad.appendChild(document.createElement("br"));
});

function playTone(key) {

    const [f1, f2] = dtmf[key];

    const osc1 = audioCtx.createOscillator();
    const osc2 = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc1.frequency.value = f1;
    osc2.frequency.value = f2;

    gain.gain.value = 0.3;

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(audioCtx.destination);

    osc1.start();
    osc2.start();

    setTimeout(() => {
        osc1.stop();
        osc2.stop();
    }, 300);

    drawGraph(f1, f2, key);
}

function drawGraph(f1, f2, key) {

    const canvas = document.getElementById("graph");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const N = fs * T;

    // Axes
    ctx.strokeStyle = "black";
    ctx.beginPath();
    ctx.moveTo(50, 10);
    ctx.lineTo(50, 250);
    ctx.lineTo(780, 250);
    ctx.stroke();

    // Grid
    ctx.strokeStyle = "#ddd";
    for(let i=0;i<10;i++){
        ctx.beginPath();
        ctx.moveTo(50 + i*70, 10);
        ctx.lineTo(50 + i*70, 250);
        ctx.stroke();
    }

    for(let i=0;i<5;i++){
        ctx.beginPath();
        ctx.moveTo(50, 50 + i*40);
        ctx.lineTo(780, 50 + i*40);
        ctx.stroke();
    }

    // Labels
    ctx.fillStyle = "black";
    ctx.fillText("Amplitude", 5, 20);
    ctx.fillText("Time (ms)", 400, 290);
    ctx.fillText("Key: " + key + 
        " | f_low=" + f1 + " Hz, f_high=" + f2 + " Hz", 
        200, 20);

    // Signal
    ctx.strokeStyle = "blue";
    ctx.beginPath();

    for(let i=0;i<N;i++){
        let t = i/fs;
        let y = Math.sin(2*Math.PI*f1*t) + 
                Math.sin(2*Math.PI*f2*t);

        let xPos = 50 + (i/N)*730;
        let yPos = 130 - y*50;

        if(i===0) ctx.moveTo(xPos,yPos);
        else ctx.lineTo(xPos,yPos);
    }

    ctx.stroke();
}
</script>

</body>
</html>
